# ==============================================================
#  docker-compose.yml – Client_Admin_Happy_Furniture (Next.js)
# ==============================================================
#
#  Cách chạy:
#    1. Sao chép .env.example → .env rồi điền giá trị thực
#    2. docker compose up --build
#
#  Admin Dashboard sẽ chạy tại: http://localhost:3000
#  (output: standalone đã được cấu hình sẵn trong next.config.ts)
# ==============================================================

services:
  happyfurniture-admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Trỏ đến URL backend thực tế (domain hoặc IP)
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    container_name: happyfurniture-admin
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      - NODE_ENV=production
